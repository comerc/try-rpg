<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:," />
    <title>RTS — Warcraft-style</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #e8e8e8;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
      #game canvas {
        display: block;
        margin: 0 auto;
        touch-action: none;
      }
    </style>
  </head>
